<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 Cat Math Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Audio placeholders -->
    <audio id="sound-correct" preload="auto"></audio>
    <audio id="sound-wrong" preload="auto"></audio>
    <audio id="sound-win" preload="auto"></audio>
    <audio id="sound-click" preload="auto"></audio>

    <!-- Main Container -->
    <div id="app">
        <!-- Header with Cat Mascot -->
        <header class="pixel-header">
            <div class="cat-mascot" id="catMascot">
                <div class="cat-pixel-art">
                    <div class="cat-ear left"></div>
                    <div class="cat-ear right"></div>
                    <div class="cat-head"></div>
                    <div class="cat-eye left"><div class="pupil"></div></div>
                    <div class="cat-eye right"><div class="pupil"></div></div>
                    <div class="cat-nose"></div>
                    <div class="cat-mouth"></div>
                    <div class="cat-whisker left"></div>
                    <div class="cat-whisker right"></div>
                    <div class="cat-body"></div>
                    <div class="cat-tail"></div>
                    <div class="cat-paw left"></div>
                    <div class="cat-paw right"></div>
                </div>
            </div>
            <h1 class="pixel-title">🐱 CAT MATH 🐱</h1>
            <p class="pixel-subtitle">Learn Math with Whiskers!</p>
        </header>

        <!-- Score Board -->
        <div class="score-board">
            <div class="score-item">
                <span class="pixel-icon">⭐</span>
                <span id="totalStars">0</span>
            </div>
            <div class="score-item">
                <span class="pixel-icon">🐟</span>
                <span id="totalTreats">0</span>
            </div>
        </div>

        <!-- Main Menu - Unit Selection -->
        <div id="mainMenu" class="menu-container">
            <h2 class="menu-title">Choose Your Adventure!</h2>
            <div class="units-grid">
                <button class="unit-btn" data-unit="1" onclick="startGame(1)">
                    <span class="unit-icon">🔢</span>
                    <span class="unit-num">1</span>
                    <span class="unit-name">Counting</span>
                </button>
                <button class="unit-btn" data-unit="2" onclick="startGame(2)">
                    <span class="unit-icon">➕</span>
                    <span class="unit-num">2</span>
                    <span class="unit-name">Addition</span>
                </button>
                <button class="unit-btn" data-unit="3" onclick="startGame(3)">
                    <span class="unit-icon">➖</span>
                    <span class="unit-num">3</span>
                    <span class="unit-name">Subtraction</span>
                </button>
                <button class="unit-btn" data-unit="4" onclick="startGame(4)">
                    <span class="unit-icon">📊</span>
                    <span class="unit-num">4</span>
                    <span class="unit-name">Sequences</span>
                </button>
                <button class="unit-btn" data-unit="5" onclick="startGame(5)">
                    <span class="unit-icon">🎲</span>
                    <span class="unit-num">5</span>
                    <span class="unit-name">Even/Odd</span>
                </button>
                <button class="unit-btn" data-unit="6" onclick="startGame(6)">
                    <span class="unit-icon">⚖️</span>
                    <span class="unit-num">6</span>
                    <span class="unit-name">Compare</span>
                </button>
                <button class="unit-btn" data-unit="7" onclick="startGame(7)">
                    <span class="unit-icon">🍎</span>
                    <span class="unit-num">7</span>
                    <span class="unit-name">Add Pics</span>
                </button>
                <button class="unit-btn" data-unit="8" onclick="startGame(8)">
                    <span class="unit-icon">🍌</span>
                    <span class="unit-num">8</span>
                    <span class="unit-name">Minus Pics</span>
                </button>
                <button class="unit-btn" data-unit="9" onclick="startGame(9)">
                    <span class="unit-icon">🔗</span>
                    <span class="unit-num">9</span>
                    <span class="unit-name">Make 10</span>
                </button>
                <button class="unit-btn" data-unit="10" onclick="startGame(10)">
                    <span class="unit-icon">✖️</span>
                    <span class="unit-num">10</span>
                    <span class="unit-name">Doubles</span>
                </button>
                <button class="unit-btn" data-unit="11" onclick="startGame(11)">
                    <span class="unit-icon">🔷</span>
                    <span class="unit-num">11</span>
                    <span class="unit-name">Shapes</span>
                </button>
                <button class="unit-btn" data-unit="12" onclick="startGame(12)">
                    <span class="unit-icon">🌈</span>
                    <span class="unit-num">12</span>
                    <span class="unit-name">Patterns</span>
                </button>
                <button class="unit-btn" data-unit="13" onclick="startGame(13)">
                    <span class="unit-icon">📖</span>
                    <span class="unit-num">13</span>
                    <span class="unit-name">Stories</span>
                </button>
                <button class="unit-btn" data-unit="14" onclick="startGame(14)">
                    <span class="unit-icon">💰</span>
                    <span class="unit-num">14</span>
                    <span class="unit-name">Money</span>
                </button>
                <button class="unit-btn" data-unit="15" onclick="startGame(15)">
                    <span class="unit-icon">⏰</span>
                    <span class="unit-num">15</span>
                    <span class="unit-name">Time</span>
                </button>
                <button class="unit-btn challenge" data-unit="16" onclick="startGame(16)">
                    <span class="unit-icon">🏆</span>
                    <span class="unit-num">16</span>
                    <span class="unit-name">Challenge!</span>
                </button>
            </div>
        </div>

        <!-- Game Container -->
        <div id="gameContainer" class="game-container hidden">
            <!-- Game Header -->
            <div class="game-header">
                <button class="pixel-btn back-btn" onclick="backToMenu()">◀ BACK</button>
                <h2 id="gameTitle" class="game-title">Game Title</h2>
                <div class="game-score">
                    <span>⭐ <span id="gameStars">0</span></span>
                </div>
            </div>

            <!-- Instructions -->
            <div class="instructions" id="instructions">
                <p id="instructionText">Follow the instructions!</p>
            </div>

            <!-- Game Area -->
            <div id="gameArea" class="game-area">
                <!-- Dynamic game content goes here -->
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <!-- Cat Helper -->
            <div class="cat-helper" id="catHelper">
                <div class="cat-bubble" id="catBubble">You can do it! 🐱</div>
                <div class="cat-mini">
                    <div class="mini-head"></div>
                    <div class="mini-ear left"></div>
                    <div class="mini-ear right"></div>
                    <div class="mini-eye left"></div>
                    <div class="mini-eye right"></div>
                    <div class="mini-nose"></div>
                </div>
            </div>
        </div>

        <!-- Results Modal -->
        <div id="resultsModal" class="modal hidden">
            <div class="modal-content pixel-box">
                <h2 class="modal-title">🎉 Great Job! 🎉</h2>
                <div class="result-stars" id="resultStars">⭐⭐⭐</div>
                <p id="resultMessage">You earned 3 stars!</p>
                <div class="treats-earned">
                    <span>🐟</span>
                    <span id="treatsEarned">+5</span>
                </div>
                <button class="pixel-btn primary" onclick="continueGame()">Continue</button>
            </div>
        </div>

        <!-- Level Complete Modal -->
        <div id="levelCompleteModal" class="modal hidden">
            <div class="modal-content pixel-box celebration">
                <h2 class="modal-title">🏆 LEVEL COMPLETE! 🏆</h2>
                <div class="celebration-cat" id="celebrationCat">🐱</div>
                <p>You completed all questions!</p>
                <div class="final-score">
                    <div>Total Stars: <span id="finalStars">0</span> ⭐</div>
                    <div>Treats Earned: <span id="finalTreats">0</span> 🐟</div>
                </div>
                <button class="pixel-btn primary" onclick="backToMenu()">Back to Menu</button>
            </div>
        </div>
    </div>

    <!-- Floating treats animation container -->
    <div id="floatingEffects" class="floating-effects"></div>

    <script src="cat-mascot.js"></script>
    <script src="sounds.js"></script>
    <script src="games.js"></script>
</body>
</html>
